items:
  - name: 身念处
    sources:
      - title: 白话解释
        content: |-
          以身体为所观，持续如实观照，不跟着贪忧跑。
      - title: 四阿含依据
        content: |-
          《杂阿含经》说："若比丘内身身观念处，精勤方便，正智正念，调伏世间贪忧。"（T02n0099_024, 0177a10-11）
      - title: 《俱舍论》依据
        content: |-
          《俱舍论》将四念住判为慧品："四念住、慧根、慧力、择法觉支、正见，以慧为体。"（T29n1558_025, 0132b13-14）
      - title: 《瑜伽師地論》依据
        content: |-
          《瑜伽師地論》在四念住总标后，释身念住云：「住循身觀略有三種。謂依身增上聞思修慧。由此慧故，於一切身、一切相，正觀察、正推求、隨觀隨覺。」（T30n1579_028, 0440a22-24）

  - name: 受念处
    sources:
      - title: 白话解释
        content: |-
          观察苦受、乐受、不苦不乐受的生灭，不执取。
      - title: 四阿含依据
        content: |-
          《杂阿含经》同一修法明列："内外身，受、心、法法观念住，亦如是说。是名比丘修四念处。"（T02n0099_024, 0176b16-18）
      - title: 《俱舍论》依据
        content: |-
          受念处属于四念住，依《俱舍论》仍归慧体，属三十七道品首门。（T29n1558_025, 0132b13-14）
      - title: 《瑜伽師地論》依据
        content: |-
          论中明受念住所观：「云何為受？謂樂受、苦受、不苦不樂受。樂身受、苦身受、不苦不樂身受。如說身受，心受亦爾。樂有愛味受、苦有愛味受、不苦不樂有愛味受。無愛味受、依耽嗜受，當知亦爾。樂依出離受、苦依出離受、不苦不樂依出離受。如是總有二十一受，或九種受。」（T30n1579_028, 0440b08-13）

  - name: 心念处
    sources:
      - title: 白话解释
        content: |-
          观察心的状态（散乱、昏沉、清明等），如实知心。
      - title: 四阿含依据
        content: |-
          《杂阿含经》明列："内外身，受、心、法法观念住，亦如是说。是名比丘修四念处。"（T02n0099_024, 0176b16-18）
      - title: 《俱舍论》依据
        content: |-
          《俱舍论》以四念住为慧观系统，心念处亦摄在其中。（T29n1558_025, 0132b13-14）
      - title: 《瑜伽師地論》依据
        content: |-
          论中明心念住所观：「云何為心？謂有貪心、離貪心、有瞋心、離瞋心、有癡心、離癡心、略心、散心、下心、舉心、掉心、不掉心、寂靜心、不寂靜心、定心、不定心、善修心、不善修心、善解脫心、不善解脫心。如是總有二十種心。」（T30n1579_028, 0440b14-18）

  - name: 法念处
    sources:
      - title: 白话解释
        content: |-
          观诸法类别与因缘（如盖、觉支、谛等），令见解归正。
      - title: 四阿含依据
        content: |-
          《杂阿含经》四念处中明确列"法法观念处"，并以调伏贪忧为修行目标。（T02n0099_024, 0176b17-18）
      - title: 《俱舍论》依据
        content: |-
          《俱舍论》说念住名义："慧由念力持令住故"，即以慧观住于法境。（T29n1558_025, 0132c01）
      - title: 《瑜伽師地論》依据
        content: |-
          论中明法念住所观：「云何為法？謂若貪、貪毘奈耶法，若瞋、瞋毘奈耶法，若癡、癡毘奈耶法，若略、若散法，若下、若舉法，若掉、不掉法，若寂靜、不寂靜法，若定、不定法，若善修、不善修法，若善解脫、不善解脫法。如是當知建立黑品、白品、染品、淨品二十種法。」（T30n1579_028, 0440b18-23）

  - name: 已生恶令断
    sources:
      - title: 白话解释
        content: |-
          已经生起的不善法，要立刻断除。
      - title: 四阿含依据
        content: |-
          《杂阿含经》："已起恶不善法断，生欲、方便、精勤、心摄受。"（T02n0099_031, 0221a24-26）
      - title: 《俱舍论》依据
        content: |-
          《俱舍论》说四正断与正精进同体："以勤为体。"（T29n1558_025, 0132b14-15）
      - title: 《瑜伽師地論》依据
        content: |-
          《瑜伽師地論》明列：「四正斷者，一、於已生惡不善法為令斷故，生欲、策勵、發勤精進，策心、持心、正斷。」（T30n1579_028, 0439c24-25）

  - name: 未生恶令不生
    sources:
      - title: 白话解释
        content: |-
          还没生起的不善法，先防护令不起。
      - title: 四阿含依据
        content: |-
          《杂阿含经》："未起恶不善法不起，生欲、方便、精勤、摄受。"（T02n0099_031, 0221a26-27）
      - title: 《俱舍论》依据
        content: |-
          《俱舍论》解释正断名义：此勤能断懈怠，故名正断。（T29n1558_025, 0132c03-04）
      - title: 《瑜伽師地論》依据
        content: |-
          《瑜伽師地論》明列：「二、於未生惡不善法為不生故，生欲、策勵、發勤精進，策心、持心、正斷。」（T30n1579_028, 0439c26-27）

  - name: 未生善令生
    sources:
      - title: 白话解释
        content: |-
          尚未生起的善法，要主动发起。
      - title: 四阿含依据
        content: |-
          《杂阿含经》："未起善法令起，生欲、方便、精勤摄受。"（T02n0099_031, 0221a27-29）
      - title: 《俱舍论》依据
        content: |-
          四正断通于止恶与生善，皆以勤策为核心作用。（T29n1558_025, 0132b14-15）
      - title: 《瑜伽師地論》依据
        content: |-
          《瑜伽師地論》明列：「三、於未生善法為令生故，生欲、策勵、發勤精進，策心、持心、正斷。」（T30n1579_028, 0439c27-28）

  - name: 已生善令增长
    sources:
      - title: 白话解释
        content: |-
          已生善法令其安住、增长、圆满。
      - title: 四阿含依据
        content: |-
          《杂阿含经》："已起善法增益修习，生欲、方便、精勤、摄受。"（T02n0099_031, 0221a29-0221b01）
      - title: 《俱舍论》依据
        content: |-
          《俱舍论》将此归四正断之修增功能，仍属勤品。（T29n1558_025, 0132b14-15）
      - title: 《瑜伽師地論》依据
        content: |-
          《瑜伽師地論》明列：「四、於已生善法為欲令住、令不忘失、令修圓滿、令倍修習、令其增長、令其廣大，生欲、策勵、發勤精進，策心、持心、正斷。」（T30n1579_028, 0439c29-0440a02）

  - name: 欲神足（欲如意足）
    sources:
      - title: 白话解释
        content: |-
          以正愿欲发动定学，令修行有方向和动力。
      - title: 四阿含依据
        content: |-
          《中阿含经》："修欲定如意足，成就断行，依离、依无欲、依灭。"（T01n0026_060, 0806a22-23）
      - title: 《俱舍论》依据
        content: |-
          《俱舍论》说四神足："以定为体"，并说"足谓欲等四三摩地"。（T29n1558_025, 0132b15; 0132c10）
      - title: 《瑜伽師地論》依据
        content: |-
          《瑜伽師地論》立四神足云：「四神足者，一、欲三摩地斷行成就神足。」又说：「當知是名欲增上三摩地。」（T30n1579_028, 0440a03; T30n1579_098, 0862b29-0862c01）

  - name: 勤神足（精进如意足）
    aliases:
      - 精进神足
      - 勤如意足
    sources:
      - title: 白话解释
        content: |-
          以持续精进支持定力，令修行不断线。
      - title: 四阿含依据
        content: |-
          《中阿含经》在四如意足中明列："如是修精进定、心定也。修思惟定如意足，成就断行。"（T01n0026_060, 0806a23-24）
      - title: 《俱舍论》依据
        content: |-
          四神足虽分欲等四门，论体皆归于定。（T29n1558_025, 0132b15）
      - title: 《瑜伽師地論》依据
        content: |-
          《瑜伽師地論》立四神足云：「四神足者，二、勤三摩地斷行成就神足。」又说：「當知是名精進增上三摩地。」（T30n1579_028, 0440a03-04; T30n1579_098, 0862c04）

  - name: 心神足（心如意足）
    aliases:
      - 念如意足
      - 心如意足
      - 心定如意足
    sources:
      - title: 白话解释
        content: |-
          又称心如意足（古译亦有作念如意足），重在令心专注、不散乱。
      - title: 四阿含依据
        content: |-
          《中阿含经》四如意足常作"心定"："修精进定、心定、思惟定成就断如意足，依离、依无欲、依灭、依舍，趣向非品。"（T01n0026_056, 0781b06-08）
      - title: 《俱舍论》依据
        content: |-
          《俱舍论》说四神足以定为体，心门即是令定成办的一足。（T29n1558_025, 0132b15）
      - title: 《瑜伽師地論》依据
        content: |-
          《瑜伽師地論》立四神足云：「四神足者，三、心三摩地斷行成就神足。」又说：「當知是名心增上三摩地。」（T30n1579_028, 0440a04-05; T30n1579_098, 0862c07）

  - name: 观神足（思惟如意足）
    aliases:
      - 观如意足
      - 思惟神足
    sources:
      - title: 白话解释
        content: |-
          以观察与抉择配合定力，避免盲修。
      - title: 四阿含依据
        content: |-
          《中阿含经》明列："修思惟定如意足，成就断行。"（T01n0026_060, 0806a24-25）
      - title: 《俱舍论》依据
        content: |-
          《俱舍论》以"欲等四三摩地"解释神足之"足"，思惟（观）即其中一门。（T29n1558_025, 0132c10）
      - title: 《瑜伽師地論》依据
        content: |-
          《瑜伽師地論》立四神足云：「四神足者，四、觀三摩地斷行成就神足。」又说：「當知是名觀增上三摩地。」（T30n1579_028, 0440a05; T30n1579_098, 0862c10）

  - name: 信根
    sources:
      - title: 白话解释
        content: |-
          对佛法僧与解脱道生起坚固净信。
      - title: 四阿含依据
        content: |-
          《杂阿含经》："若比丘于如来所起净信心，根本坚固，余沙门、婆罗门、诸天、魔、梵，及余世间，无能沮坏其心者，是名信根。"（T02n0099_026, 0182b26-29）
      - title: 《俱舍论》依据
        content: |-
          《俱舍论》："信根、信力，以信为体。"（T29n1558_025, 0132b16）
      - title: 《瑜伽師地論》依据
        content: |-
          论中说：「由思擇力，如理作意思惟諸法，乃於涅槃得正信解。」并于总标立「五根者，一、信根，二、精進根，三、念根，四、定根，五、慧根。」（T30n1579_098, 0863b26-27; T30n1579_028, 0440a06）

  - name: 精进根
    sources:
      - title: 白话解释
        content: |-
          断恶修善的持续动力。
      - title: 四阿含依据
        content: |-
          《杂阿含经》直接以四正断定义精进根。（T02n0099_026, 0182b29-0182c04）
      - title: 《俱舍论》依据
        content: |-
          精进根属于"勤"这一实法，在三十七品中反复出现。（T29n1558_025, 0132b14-15）
      - title: 《瑜伽師地論》依据
        content: |-
          《瑜伽師地論》说五根次第作用：「由此增上，發勤精進。」（T30n1579_098, 0863b27-28）

  - name: 念根
    sources:
      - title: 白话解释
        content: |-
          对所修正法不忘失，能持续照看身受心法。
      - title: 四阿含依据
        content: |-
          《杂阿含经》："何等为念根？若比丘内身身观住，慇懃方便，正念正智，调伏世间贪忧；外身、内外身、受、心、法法观念住，亦如是说，是名念根。"（T02n0099_026, 0182c05-07）
      - title: 《俱舍论》依据
        content: |-
          《俱舍论》："念根、念力、念觉支、正念，以念为体。"（T29n1558_025, 0132b16-17）
      - title: 《瑜伽師地論》依据
        content: |-
          《瑜伽師地論》说五根次第作用：「此增上故，能於身等所緣境界安住正念。」（T30n1579_098, 0863b28-29）

  - name: 定根
    sources:
      - title: 白话解释
        content: |-
          心安住不乱，具备稳定禅定能力。
      - title: 四阿含依据
        content: |-
          《杂阿含经》："何等为定根？若比丘离欲恶不善法，有觉有观，离生喜乐，乃至第四禅具足住，是名定根。"（T02n0099_026, 0182c08-09）
      - title: 《俱舍论》依据
        content: |-
          定根与四神足、定觉支、正定同属定体系统。（T29n1558_025, 0132b15）
      - title: 《瑜伽師地論》依据
        content: |-
          《瑜伽師地論》说五根次第作用：「此增上故，能於所緣令心一趣。」（T30n1579_098, 0863b29-0863c01）

  - name: 慧根
    sources:
      - title: 白话解释
        content: |-
          能如实了知四圣谛与诸法相。
      - title: 四阿含依据
        content: |-
          《杂阿含经》："何等为慧根？若比丘苦圣谛如实知，苦集圣谛、苦灭圣谛、苦灭道迹圣谛如实知，是名慧根。"（T02n0099_026, 0182c10-12）
      - title: 《俱舍论》依据
        content: |-
          《俱舍论》把慧作为四念住、慧根慧力、择法觉支、正见之共同体性。（T29n1558_025, 0132b13-14）
      - title: 《瑜伽師地論》依据
        content: |-
          《瑜伽師地論》说五根次第作用：「此增上故，於一切法如實了知、如實觀見。由是因緣，能到究竟。是故此慧，若初若後多有所作，故說慧根最為殊勝。」（T30n1579_098, 0863c01-03）

  - name: 信力
    sources:
      - title: 白话解释
        content: |-
          信心强到不为外缘所屈伏。
      - title: 四阿含依据
        content: |-
          《杂阿含经》："何等为信力？谓圣弟子于如来所入于净信，根本坚固，诸天、魔、梵、沙门、婆罗门及诸同法所不能坏，是名信力。"（T02n0099_026, 0184c11-13）
      - title: 《俱舍论》依据
        content: |-
          《俱舍论》明说"先说为根，后名为力"，差别在可屈伏与不可屈伏。（T29n1558_025, 0132c12-13）
      - title: 《瑜伽師地論》依据
        content: |-
          《瑜伽師地論》总标五力：「五力者，一、信力，二、精進力，三、念力，四、定力，五、慧力。」并说「有學者成就五力」。（T30n1579_028, 0440a07; T30n1579_098, 0864a22-23）

  - name: 精进力
    sources:
      - title: 白话解释
        content: |-
          精进增强到足以稳定破除懈怠。
      - title: 四阿含依据
        content: |-
          《杂阿含经》："何等为精进力？谓修四正断。"（T02n0099_026, 0184c14）
      - title: 《俱舍论》依据
        content: |-
          精进力与精进根同体，至胜用位名"力"。（T29n1558_025, 0132c12-13）
      - title: 《瑜伽師地論》依据
        content: |-
          《瑜伽師地論》总标五力：「五力者，一、信力，二、精進力，三、念力，四、定力，五、慧力。」并说「有學者成就五力」。（T30n1579_028, 0440a07; T30n1579_098, 0864a22-23）

  - name: 念力
    sources:
      - title: 白话解释
        content: |-
          念稳定有力，复杂境界中也不失正念。
      - title: 四阿含依据
        content: |-
          《长阿含经》列五力："信力、精进力、念力、定力、慧力。"（T01n0001_008, 0051b14）
      - title: 《俱舍论》依据
        content: |-
          《俱舍论》将念力与念根、念觉支、正念同判为念体。（T29n1558_025, 0132b16-17）
      - title: 《瑜伽師地論》依据
        content: |-
          《瑜伽師地論》总标五力：「五力者，一、信力，二、精進力，三、念力，四、定力，五、慧力。」并说「有學者成就五力」。（T30n1579_028, 0440a07; T30n1579_098, 0864a22-23）

  - name: 定力
    sources:
      - title: 白话解释
        content: |-
          定已坚固，能持续摄心并支持观慧。
      - title: 四阿含依据
        content: |-
          《长阿含经》明列定力为五力之一。（T01n0001_008, 0051b14）
      - title: 《俱舍论》依据
        content: |-
          《俱舍论》把定力与四神足、定根、定觉支、正定同归定体。（T29n1558_025, 0132b15）
      - title: 《瑜伽師地論》依据
        content: |-
          《瑜伽師地論》总标五力：「五力者，一、信力，二、精進力，三、念力，四、定力，五、慧力。」并说「有學者成就五力」。（T30n1579_028, 0440a07; T30n1579_098, 0864a22-23）

  - name: 慧力
    sources:
      - title: 白话解释
        content: |-
          慧增长到能稳定破惑、导向解脱。
      - title: 四阿含依据
        content: |-
          《长阿含经》列慧力为五力之一。（T01n0001_008, 0051b14）
      - title: 《俱舍论》依据
        content: |-
          慧力与正见、择法觉支等同属慧体，主抉择与照见。（T29n1558_025, 0132b13-14）
      - title: 《瑜伽師地論》依据
        content: |-
          《瑜伽師地論》总标五力：「五力者，一、信力，二、精進力，三、念力，四、定力，五、慧力。」并说「有學者成就五力」。（T30n1579_028, 0440a07; T30n1579_098, 0864a22-23）

  - name: 择法觉支
    sources:
      - title: 白话解释
        content: |-
          能辨别善恶、正邪、应修与应舍。
      - title: 四阿含依据
        content: |-
          《杂阿含经》列七觉分："念、择法、精进、喜、猗、定、舍。"（T02n0099_027, 0193b16-17）
      - title: 《俱舍论》依据
        content: |-
          《俱舍论》把择法觉支归入慧体系统。（T29n1558_025, 0132b13-14）
      - title: 《瑜伽師地論》依据
        content: |-
          《瑜伽師地論》以譬喻释七觉支：「擇法覺支猶如象寶。」（T30n1579_098, 0864c25）

  - name: 精进觉支
    sources:
      - title: 白话解释
        content: |-
          对已择之正法持续推进，不懈退。
      - title: 四阿含依据
        content: |-
          《杂阿含经》说精进觉分之食是四正断思惟，故能增长。（T02n0099_027, 0192c24-25）
      - title: 《俱舍论》依据
        content: |-
          精进觉支与四正断、正精进同为勤体。（T29n1558_025, 0132b14-15）
      - title: 《瑜伽師地論》依据
        content: |-
          《瑜伽師地論》以譬喻释七觉支：「精進覺支猶如馬寶。」（T30n1579_098, 0864c26-27）

  - name: 喜觉支
    sources:
      - title: 白话解释
        content: |-
          与法相应而生清净喜，不是欲乐刺激。
      - title: 四阿含依据
        content: |-
          《杂阿含经》说"喜觉分食"：思惟喜与喜处，未生令生、已生增广。（T02n0099_027, 0192c26-27）
      - title: 《俱舍论》依据
        content: |-
          《俱舍论》直说"喜觉支以喜为体"。（T29n1558_025, 0132b17）
      - title: 《瑜伽師地論》依据
        content: |-
          《瑜伽師地論》以譬喻释七觉支：「其喜覺支猶如女寶。」（T30n1579_098, 0864c27-28）

  - name: 除觉支
    aliases:
      - 猗觉支
      - 轻安觉支
    sources:
      - title: 白话解释
        content: |-
          对应猗/轻安：令身心由粗重转为轻利安适。
      - title: 四阿含依据
        content: |-
          《杂阿含经》七觉分中作"猗觉分"。（T02n0099_027, 0193b17）
      - title: 《俱舍论》依据
        content: |-
          《俱舍论》对应说明："轻安觉支以轻安为体。"（T29n1558_025, 0132b18-19）
      - title: 《瑜伽師地論》依据
        content: |-
          《瑜伽師地論》以譬喻释七觉支：「輕安覺支如神珠寶。」（T30n1579_098, 0864c29）

  - name: 舍觉支
    sources:
      - title: 白话解释
        content: |-
          保持平等、不偏执，使心稳而不僵。
      - title: 四阿含依据
        content: |-
          《杂阿含经》将舍觉分列为七觉分之一，并说可修习增广。（T02n0099_027, 0193b17; 0193a05-06）
      - title: 《俱舍论》依据
        content: |-
          《俱舍论》："舍觉支以行舍为体。"（T29n1558_025, 0132b18）
      - title: 《瑜伽師地論》依据
        content: |-
          《瑜伽師地論》以譬喻释七觉支：「其捨覺支如軍將寶。」（T30n1579_098, 0865a04）

  - name: 定觉支
    sources:
      - title: 白话解释
        content: |-
          于觉知中得一心不乱，令道心可持续。
      - title: 四阿含依据
        content: |-
          《杂阿含经》："何等为定觉分食？谓有四禅思惟，未生定觉分令生起，已生定觉分重生令增广，是名定觉分食。"（T02n0099_027, 0193a01-03）
      - title: 《俱舍论》依据
        content: |-
          《俱舍论》将定觉支与四神足、定根、定力、正定同判为定体。（T29n1558_025, 0132b15）
      - title: 《瑜伽師地論》依据
        content: |-
          《瑜伽師地論》以譬喻释七觉支：「其定覺支如藏臣寶。」（T30n1579_098, 0865a01-02）

  - name: 念觉支
    sources:
      - title: 白话解释
        content: |-
          念能总摄诸支，防散乱与忘失。
      - title: 四阿含依据
        content: |-
          《杂阿含经》："何等为念觉分食？谓四念处思惟已，未生念觉分令起，已生转生令增广。"（T02n0099_027, 0192c19-20）
      - title: 《俱舍论》依据
        content: |-
          《俱舍论》：念觉支与念根、念力、正念同以念为体。（T29n1558_025, 0132b16-17）
      - title: 《瑜伽師地論》依据
        content: |-
          《瑜伽師地論》以譬喻释七觉支：「初念覺支猶如輪寶。」（T30n1579_098, 0864c23-24）

  - name: 正见
    sources:
      - title: 白话解释
        content: |-
          如实理解因果与四谛，是八正道的导首。
      - title: 四阿含依据
        content: |-
          《杂阿含经》定义："何等为正见？谓说有施、有说、有斋，有善行、有恶行，有善恶行果报，有此世、有他世，有父母、有众生生，有阿罗汉善到、善向，有此世、他世自知作证具足住：我生已尽，梵行已立，所作已作，自知不受后有。"并说："正见者，能起正志、正语、正业、正命、正方便、正念、正定。"（T02n0099_028, 0203a05-09; 0204b05-06）
      - title: 《俱舍论》依据
        content: |-
          《俱舍论》：正见与四念住、慧根慧力、择法觉支同以慧为体。（T29n1558_025, 0132b13-14）
      - title: 《瑜伽師地論》依据
        content: |-
          《瑜伽師地論》明言：「正見為首八聖道支，會正理故，說名為法。」并广分「正見差別略有十一」。（T30n1579_098, 0865c12-13; T30n1579_068, 0674c03）

  - name: 正思惟（正志）
    aliases:
      - 正志
      - 正思维
    sources:
      - title: 白话解释
        content: |-
          以出离、无恚、无害为思维方向。
      - title: 四阿含依据
        content: |-
          《杂阿含经》："何等为正志？谓出要志、无恚志、不害志。"（T02n0099_028, 0203a09-10）
      - title: 《俱舍论》依据
        content: |-
          《俱舍论》明判："正思惟以寻为体。"（T29n1558_025, 0132b19）
      - title: 《瑜伽師地論》依据
        content: |-
          《瑜伽師地論》说八圣道生起次第：「外善知識者，謂從彼聞無上正法，由此故名從他聞音。內正思惟者，謂此無間，能發正見為上首道。」（T30n1579_098, 0865b28-29）

  - name: 正语
    sources:
      - title: 白话解释
        content: |-
          远离妄语、两舌、恶口、绮语。
      - title: 四阿含依据
        content: |-
          《杂阿含经》："何等为正语？谓离妄语、离两舌、离恶口、离绮语。"（T02n0099_028, 0203a10-11）
      - title: 《俱舍论》依据
        content: |-
          《俱舍论》：正语、正业、正命同"以戒为体"。（T29n1558_025, 0132b19）
      - title: 《瑜伽師地論》依据
        content: |-
          《瑜伽師地論》说：「問：何因緣故，正語、正業、正命說為戒蘊？答：二因緣故。一、依正受用法故；二、依正受用財故。謂正語、正業，戒為根本、戒為所依，方能受用一切正法。」（T30n1579_068, 0674b05-08）

  - name: 正业
    sources:
      - title: 白话解释
        content: |-
          在行动上离杀、盗、邪淫等不善业。
      - title: 四阿含依据
        content: |-
          《杂阿含经》："何等为正业？谓离杀、盗、婬。"（T02n0099_028, 0203a12）
      - title: 《俱舍论》依据
        content: |-
          《俱舍论》将正业摄入戒体三支之一。（T29n1558_025, 0132b19）
      - title: 《瑜伽師地論》依据
        content: |-
          《瑜伽師地論》说：「問：何因緣故，正語、正業、正命說為戒蘊？答：二因緣故。一、依正受用法故；二、依正受用財故。謂正語、正業，戒為根本、戒為所依，方能受用一切正法。」（T30n1579_068, 0674b05-08）

  - name: 正命
    sources:
      - title: 白话解释
        content: |-
          以如法方式资身，不以邪命求利。
      - title: 四阿含依据
        content: |-
          《杂阿含经》："何等为正命？谓如法求衣服、饮食、卧具、汤药。"（T02n0099_028, 0203a12-13）
      - title: 《俱舍论》依据
        content: |-
          《俱舍论》：正命同正语、正业，皆属戒体。（T29n1558_025, 0132b19）
      - title: 《瑜伽師地論》依据
        content: |-
          《瑜伽師地論》说：「由正命故，不依矯詐等起邪命法求衣服等，此為根本、此為依處，正受用財。」（T30n1579_068, 0674b09-11）

  - name: 正方便（正精进）
    aliases:
      - 正方便
      - 正精进
    sources:
      - title: 白话解释
        content: |-
          正确而持续的努力，令断恶修善真正发生。
      - title: 四阿含依据
        content: |-
          《杂阿含经》："何等为正方便？谓欲、精进、方便、出离、勤竞、堪能常行不退。"（T02n0099_028, 0203a13-15）
      - title: 《俱舍论》依据
        content: |-
          《俱舍论》把正精进与四正断、精进根力、精进觉支同判为勤体。（T29n1558_025, 0132b14-15）
      - title: 《瑜伽師地論》依据
        content: |-
          《瑜伽師地論》说：「復次，略有五種發起正精進因緣。一、宣說正法；二、修行共住；三、察懈怠過失，見精進功德；四、由思擇力相續成熟；五、知所證得前後差別。」（T30n1579_068, 0675b02-05）

  - name: 正念
    sources:
      - title: 白话解释
        content: |-
          念念不妄不虚，持续忆持正法与所缘。
      - title: 四阿含依据
        content: |-
          《杂阿含经》："何等为正念？谓念随顺，念不妄、不虚。"（T02n0099_028, 0203a15-16）
      - title: 《俱舍论》依据
        content: |-
          《俱舍论》：正念与念根、念力、念觉支同以念为体。（T29n1558_025, 0132b16-17）
      - title: 《瑜伽師地論》依据
        content: |-
          《瑜伽師地論》说：「問：何因緣故，正念、正定說為定蘊？答：二因緣故。一、由自性故；二、由所依故。由自性者，謂三摩地。由所依者，四因緣故，念於此定能作所依。一、繫所緣故。謂於四念住繫攝其心。」（T30n1579_068, 0674b22-26）

  - name: 正定
    sources:
      - title: 白话解释
        content: |-
          心住一境而不乱，成为解脱慧的依止。
      - title: 四阿含依据
        content: |-
          《杂阿含经》："何等为正定？谓住心不乱、坚固、摄持、寂止、三昧、一心。"（T02n0099_028, 0203a16-17）
      - title: 《俱舍论》依据
        content: |-
          《俱舍论》将正定归入定体，并与四神足、定根、定力、定觉支相贯通。（T29n1558_025, 0132b15）
      - title: 《瑜伽師地論》依据
        content: |-
          《瑜伽師地論》说：「由自性者，謂三摩地。由所依者，四因緣故，念於此定能作所依。」（T30n1579_068, 0674b23-25）
