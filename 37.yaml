items:
  - name: 身念处
    sources:
      - title: 白话解释
        content: |-
          把注意力安住在身体本身，持续观察呼吸、行住坐卧、冷热苦乐等身体现象，看到它是不断变化、不可执著的。
      - title: 《杂阿含经》依据
        content: |-
          《杂阿含经》“念处相应”反复说修四念处，先观身如身，住于正知正念，离贪忧。
      - title: 《俱舍论》依据
        content: |-
          《俱舍论》卷二十五（分别贤圣品）把四念住列为道品首门，说明以慧观身、受、心、法四境。

  - name: 受念处
    sources:
      - title: 白话解释
        content: |-
          观察一切感受：乐受、苦受、不苦不乐受。重点不是追着感受跑，而是看见它生起、变化、消失。
      - title: 《杂阿含经》依据
        content: |-
          《杂阿含经》四念处相关经文中，明示“观受如受”，对受保持如实知，不被贪爱牵引。
      - title: 《俱舍论》依据
        content: |-
          《俱舍论》卷二十五将受念住摄入道品，依慧观察受蕴，趣向离苦。

  - name: 心念处
    sources:
      - title: 白话解释
        content: |-
          直接看当下这颗心：有没有贪、嗔、痴，散乱还是安定，昏沉还是明净。看见心的状态，就不容易被心拖着走。
      - title: 《杂阿含经》依据
        content: |-
          《杂阿含经》四念处经系中有“观心如心”，观察有贪心、离贪心等差别，令心如实被了知。
      - title: 《俱舍论》依据
        content: |-
          《俱舍论》卷二十五以慧照心，属四念住之一，作为入道观行的关键步骤。

  - name: 法念处
    sources:
      - title: 白话解释
        content: |-
          观察“法”就是观察修行中的规则与结构，例如五盖、七觉支、五蕴、四圣谛等，让心按正道运作。
      - title: 《杂阿含经》依据
        content: |-
          《杂阿含经》“观法如法”常与四圣谛、诸盖、觉支等内容并说，属于念处修法的完成面。
      - title: 《俱舍论》依据
        content: |-
          《俱舍论》卷二十五将法念住作为四念住之一，仍以慧为体，所缘为诸法差别。

  - name: 已生恶令断
    sources:
      - title: 白话解释
        content: |-
          已经生起的不善念头或行为，要立刻止损、断掉，不给它继续扩大。
      - title: 《杂阿含经》依据
        content: |-
          《杂阿含经》四正断相关经文明确提出：已生恶不善法，当令断。
      - title: 《俱舍论》依据
        content: |-
          《俱舍论》卷二十五说四正断以“勤”为体，此条即对已生不善法作断除功用。

  - name: 未生恶令不生
    sources:
      - title: 白话解释
        content: |-
          还没生起的不善，要预防它发生。重点在防患未然，守好身口意的入口。
      - title: 《杂阿含经》依据
        content: |-
          《杂阿含经》四正断中第二条即“未生恶不善法令不生”。
      - title: 《俱舍论》依据
        content: |-
          《俱舍论》卷二十五把此归入四正断，强调勤策力用，先遮后断。

  - name: 未生善令生
    sources:
      - title: 白话解释
        content: |-
          还没有出现的善法，要主动培养出来，不等它自己出现。
      - title: 《杂阿含经》依据
        content: |-
          《杂阿含经》四正断第三条：未生善法，当令生起。
      - title: 《俱舍论》依据
        content: |-
          《俱舍论》卷二十五解释四正断有“生善”的正向功能，不只是压制恶法。

  - name: 已生善令增长
    sources:
      - title: 白话解释
        content: |-
          已经有的善法，要继续巩固、扩大、成熟，让它变成稳定能力。
      - title: 《杂阿含经》依据
        content: |-
          《杂阿含经》四正断第四条：已生善法令住、令增广、令修习圆满。
      - title: 《俱舍论》依据
        content: |-
          《俱舍论》卷二十五把这一条归为“修增”作用，即善法相续增长。

  - name: 欲如意足
    sources:
      - title: 白话解释
        content: |-
          先有正确而强烈的愿求：我真想修、真想证。这个愿求推动专注力和执行力。
      - title: 《杂阿含经》依据
        content: |-
          《杂阿含经》四神足经文以欲、精进、心、观（或译思惟）为次第因缘。
      - title: 《俱舍论》依据
        content: |-
          《俱舍论》卷二十五说四神足以定为体，欲等四法为助伴，故名“欲神足”。

  - name: 精进如意足
    sources:
      - title: 白话解释
        content: |-
          持续而不松懈地用功，把“想修”落实成“不断修”。
      - title: 《杂阿含经》依据
        content: |-
          《杂阿含经》四神足中列“精进神足”，强调勤修令定成就。
      - title: 《俱舍论》依据
        content: |-
          《俱舍论》卷二十五把“勤神足”列为四神足之一，说明由勤策发起定力。

  - name: 念如意足
    sources:
      - title: 白话解释
        content: |-
          对所修法门持续记得、持续提起，不忘失修行方向。
      - title: 《杂阿含经》依据
        content: |-
          《杂阿含经》四神足经系常见“心神足”译法，汉地也有系统以“念”来表达其不忘失之义。
      - title: 《俱舍论》依据
        content: |-
          《俱舍论》卷二十五常作“心神足”，其要义是令心专注不散，与你此处“念如意足”在修行功能上相通。

  - name: 思惟如意足
    sources:
      - title: 白话解释
        content: |-
          用正确观察和抉择来持续校准修行，避免盲修。
      - title: 《杂阿含经》依据
        content: |-
          《杂阿含经》四神足常以“观”神足立名，汉译脉络中“思惟”即此观照抉择之功能。
      - title: 《俱舍论》依据
        content: |-
          《俱舍论》卷二十五说四神足中的“观”能助定成办，令修行不偏不乱。

  - name: 信根
    sources:
      - title: 白话解释
        content: |-
          对正法、正道、修行可达成解脱这件事，有稳定而理性的信心。
      - title: 《杂阿含经》依据
        content: |-
          《杂阿含经》在五根相应中，把信根列为第一，作为入道的发动点。
      - title: 《俱舍论》依据
        content: |-
          《俱舍论》卷二十五说五根为信、勤、念、定、慧，能于善法中起增上用。

  - name: 精进根
    sources:
      - title: 白话解释
        content: |-
          持续投入正行，不间断、不懈怠。
      - title: 《杂阿含经》依据
        content: |-
          《杂阿含经》五根次第中，信后即勤（精进），显示信心要落实为行动。
      - title: 《俱舍论》依据
        content: |-
          《俱舍论》卷二十五将勤根视为推动诸善品增长的核心动力之一。

  - name: 念根
    sources:
      - title: 白话解释
        content: |-
          持续记住修行目标与方法，不被境界带跑。
      - title: 《杂阿含经》依据
        content: |-
          《杂阿含经》五根、五力与八正道都重视“念”，以正忆念维持道心。
      - title: 《俱舍论》依据
        content: |-
          《俱舍论》卷二十五立念根为五根之一，能令心于所缘不忘失。

  - name: 定根
    sources:
      - title: 白话解释
        content: |-
          让心能安住、不散乱，具备稳定专注力。
      - title: 《杂阿含经》依据
        content: |-
          《杂阿含经》五根相应中，定根与念根相互扶持，令心住于正道。
      - title: 《俱舍论》依据
        content: |-
          《俱舍论》卷二十五将定根列为五根之一，作为止观进展的重要条件。

  - name: 慧根
    sources:
      - title: 白话解释
        content: |-
          对因果、无常、无我、四谛等如实观察和判断的能力。
      - title: 《杂阿含经》依据
        content: |-
          《杂阿含经》五根中以慧根收束，显示修行最终要落实为如实知见。
      - title: 《俱舍论》依据
        content: |-
          《俱舍论》卷二十五说慧根能抉择诸法，导向见道与解脱。

  - name: 信力
    sources:
      - title: 白话解释
        content: |-
          信心强到不会轻易被怀疑、邪见、外缘动摇。
      - title: 《杂阿含经》依据
        content: |-
          《杂阿含经》把五力与五根并说，信力即信根增长到“不可屈伏”。
      - title: 《俱舍论》依据
        content: |-
          《俱舍论》卷二十五说明“根力体同”，在胜用位立名为力。

  - name: 精进力
    sources:
      - title: 白话解释
        content: |-
          精进强到足以对治懈怠，遇阻也能持续推进。
      - title: 《杂阿含经》依据
        content: |-
          《杂阿含经》五力中的勤力（精进力），强调破除放逸和懈怠。
      - title: 《俱舍论》依据
        content: |-
          《俱舍论》卷二十五将勤力列于五力，表示修道动力已具强制力。

  - name: 念力
    sources:
      - title: 白话解释
        content: |-
          念的力量强到在复杂境界中也不忘正法、不失方向。
      - title: 《杂阿含经》依据
        content: |-
          《杂阿含经》五力与七觉支都强调“念”是防失念、护正道的关键。
      - title: 《俱舍论》依据
        content: |-
          《俱舍论》卷二十五说念力能令所修不忘失，维持道品连续。

  - name: 定力
    sources:
      - title: 白话解释
        content: |-
          定强到能压伏散乱，使观行有持续深度。
      - title: 《杂阿含经》依据
        content: |-
          《杂阿含经》五力中的定力，与念力并行，令心住而不乱。
      - title: 《俱舍论》依据
        content: |-
          《俱舍论》卷二十五认为定力可令心专一，成为后续慧观依止。

  - name: 慧力
    sources:
      - title: 白话解释
        content: |-
          智慧强到能稳定破除迷惑，不再轻易被错误见解带走。
      - title: 《杂阿含经》依据
        content: |-
          《杂阿含经》五力以慧力作收，指向对四圣谛的如实了知。
      - title: 《俱舍论》依据
        content: |-
          《俱舍论》卷二十五将慧力立为破惑之要，导向出离。

  - name: 择法觉支
    sources:
      - title: 白话解释
        content: |-
          能分辨什么是正法、什么会让心退步，修行上会“选对法”。
      - title: 《杂阿含经》依据
        content: |-
          《杂阿含经》七觉支相应把择法觉支列于前位，作为后续精进等支的引导。
      - title: 《俱舍论》依据
        content: |-
          《俱舍论》卷二十五把择法觉支解释为于法抉择，能顺向菩提。

  - name: 精进觉支
    sources:
      - title: 白话解释
        content: |-
          对已选定的正法持续用功，不半途而废。
      - title: 《杂阿含经》依据
        content: |-
          《杂阿含经》七觉支中次说精进，令所择正法得以推进。
      - title: 《俱舍论》依据
        content: |-
          《俱舍论》卷二十五将精进觉支列为推动诸觉支增长的发动力。

  - name: 喜觉支
    sources:
      - title: 白话解释
        content: |-
          修行走在正路上时，内心会生起清净喜悦，不是外境刺激的兴奋。
      - title: 《杂阿含经》依据
        content: |-
          《杂阿含经》七觉支次第中有“喜”，由正法相应而生，能资益修行。
      - title: 《俱舍论》依据
        content: |-
          《俱舍论》卷二十五将喜觉支列为顺道之支，能令心乐于善法。

  - name: 除觉支
    sources:
      - title: 白话解释
        content: |-
          这里的“除”可理解为轻安、调柔：把粗重烦扰慢慢放下，身心更轻快。
      - title: 《杂阿含经》依据
        content: |-
          《杂阿含经》七觉支汉译系统中有“猗（轻安）”与“除”等译名差别，意义都指向身心调柔安适。
      - title: 《俱舍论》依据
        content: |-
          《俱舍论》卷二十五对应此支为轻安功能，能对治粗重与躁动。

  - name: 舍觉支
    sources:
      - title: 白话解释
        content: |-
          对顺逆境界保持平衡，不偏爱、不抗拒，心平而明。
      - title: 《杂阿含经》依据
        content: |-
          《杂阿含经》七觉支中的舍，强调不取不舍、平等观察。
      - title: 《俱舍论》依据
        content: |-
          《俱舍论》卷二十五将舍觉支作为成熟位的重要平衡力量。

  - name: 定觉支
    sources:
      - title: 白话解释
        content: |-
          觉知力与专注力结合，心住一境而清楚不昏。
      - title: 《杂阿含经》依据
        content: |-
          《杂阿含经》七觉支中，定觉支与念、舍相互成就，令观行稳定。
      - title: 《俱舍论》依据
        content: |-
          《俱舍论》卷二十五把定觉支列入菩提分法，作为见道前后都重要的正修因素。

  - name: 念觉支
    sources:
      - title: 白话解释
        content: |-
          持续清楚记得“正在修什么、为什么修”，不被妄念冲走。
      - title: 《杂阿含经》依据
        content: |-
          《杂阿含经》七觉支经文中，念常被视为总持诸支的核心。
      - title: 《俱舍论》依据
        content: |-
          《俱舍论》卷二十五认为念能摄持所修，令觉支不散失。

  - name: 正见
    sources:
      - title: 白话解释
        content: |-
          对生命与修行先有正确地图：知道苦、苦因、苦灭、灭苦之道。
      - title: 《杂阿含经》依据
        content: |-
          《杂阿含经》八正道相应中，以正见为首，常以知四圣谛为核心内容。
      - title: 《俱舍论》依据
        content: |-
          《俱舍论》卷二十五立八圣道支，正见居首，为其余道支之导。

  - name: 正思惟
    sources:
      - title: 白话解释
        content: |-
          让思考方向正确：远离贪害恚，朝向出离、慈悲、无害。
      - title: 《杂阿含经》依据
        content: |-
          《杂阿含经》八正道中，正志（正思惟）紧随正见，表示见后要有正确动机与意向。
      - title: 《俱舍论》依据
        content: |-
          《俱舍论》卷二十五把正思惟列为道支之一，摄正向审虑功能。

  - name: 正语
    sources:
      - title: 白话解释
        content: |-
          说话守正：不妄语、不两舌、不恶口、不绮语。
      - title: 《杂阿含经》依据
        content: |-
          《杂阿含经》八正道次第中，正语属于戒学面的关键实践。
      - title: 《俱舍论》依据
        content: |-
          《俱舍论》卷二十五将正语纳入道支，作为身口业清净的一环。

  - name: 正业
    sources:
      - title: 白话解释
        content: |-
          行为守正：离杀、盗、邪淫等不善业，落实清净行动。
      - title: 《杂阿含经》依据
        content: |-
          《杂阿含经》八正道中，正业与正语、正命同属戒行核心。
      - title: 《俱舍论》依据
        content: |-
          《俱舍论》卷二十五把正业列入道支，说明其为入圣道的基础条件。

  - name: 正命
    sources:
      - title: 白话解释
        content: |-
          谋生方式要正当，不靠伤害、欺骗、邪业来维生。
      - title: 《杂阿含经》依据
        content: |-
          《杂阿含经》明列“正命”为八圣道第六前位（在正方便之前），与正语、正业相续。
      - title: 《俱舍论》依据
        content: |-
          《俱舍论》卷二十五将正命摄入道支，归属于戒学清净的延伸。

  - name: 正方便（正精进）
    aliases:
      - 正方便
      - 正精进
    sources:
      - title: 白话解释
        content: |-
          为了离恶修善而持续用功的正确努力。你可以把它理解为“把四正勤落实到八正道里”。
      - title: 《杂阿含经》依据
        content: |-
          《杂阿含经》多处用“正方便”作第六道支（如“正命、正方便、正念、正定”次第）。
      - title: 《俱舍论》依据
        content: |-
          《俱舍论》卷二十五对应道支中“正勤（正精进）”之义，与“正方便”同一功能面。

  - name: 正念
    sources:
      - title: 白话解释
        content: |-
          在当下保持清楚、记得正法，不随妄念流走；四念处就是正念最核心的训练。
      - title: 《杂阿含经》依据
        content: |-
          《杂阿含经》八正道与念处体系互相贯通，正念常与四念处并说。
      - title: 《俱舍论》依据
        content: |-
          《俱舍论》卷二十五将正念立为道支，能摄持诸善，防失念。

  - name: 正定
    sources:
      - title: 白话解释
        content: |-
          让心安住于正所缘，稳定、清明、有力量，成为智慧现前的依止。
      - title: 《杂阿含经》依据
        content: |-
          《杂阿含经》八正道以正定作收，显示道支修学最终要归于心一境性与解脱。
      - title: 《俱舍论》依据
        content: |-
          《俱舍论》卷二十五把正定列为八圣道最后一支，作为止观与圣道现前的重要依处。
